name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  static-linux:
    name: Static Linux
    runs-on: ubuntu-latest
    needs: test-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build

      - name: Configure static build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        run: |
          mkdir -p dist
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            output="dist/platlang-develop-linux-x86_64"
          else
            output="dist/platlang-linux-x86_64"
          fi
          cp build/platlang "$output"
          strip "$output"
          chmod +x "$output"

      - name: Upload Linux artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: platlang-linux-x86_64
          path: dist/*
          if-no-files-found: error

  static-windows:
    name: Static Windows
    runs-on: windows-latest
    needs: test-linux

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            flex
            bison
            diffutils

      - name: Configure static build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        run: |
          mkdir -p dist
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            output="dist/platlang-develop-windows-x86_64.exe"
          else
            output="dist/platlang-windows-x86_64.exe"
          fi
          cp build/platlang.exe "$output"
          strip "$output"

      - name: Upload Windows artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: platlang-windows-x86_64
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - static-linux
      - static-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/platlang-linux-x86_64/platlang-linux-x86_64 \
            dist/platlang-windows-x86_64/platlang-windows-x86_64.exe \
            --repo "${GITHUB_REPOSITORY}" \
            --title "plat-lang ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"

  develop-release:
    name: Develop Release
    runs-on: ubuntu-latest
    needs:
      - static-linux
      - static-windows
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    concurrency:
      group: develop-release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move develop release tag
        run: |
          git tag -f develop-latest "${GITHUB_SHA}"
          git push --force origin refs/tags/develop-latest

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Continuously updated development build from the develop branch.

          Commit: ${GITHUB_SHA}

          This is an unstable build for testing the latest changes. Use tagged releases for stable versions."

          if gh release view develop-latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit develop-latest \
              --repo "${GITHUB_REPOSITORY}" \
              --title "plat-lang develop" \
              --notes "${notes}" \
              --prerelease
          else
            gh release create develop-latest \
              --repo "${GITHUB_REPOSITORY}" \
              --title "plat-lang develop" \
              --notes "${notes}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

          gh release upload develop-latest \
            dist/platlang-linux-x86_64/platlang-develop-linux-x86_64 \
            dist/platlang-windows-x86_64/platlang-develop-windows-x86_64.exe \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
