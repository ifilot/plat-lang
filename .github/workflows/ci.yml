name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  static-linux:
    name: Static Linux
    runs-on: ubuntu-latest
    needs: test-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build

      - name: Configure static build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          cp build/platlang dist/platlang-linux-x86_64
          chmod +x dist/platlang-linux-x86_64

      - name: Upload Linux artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: platlang-linux-x86_64
          path: dist/platlang-linux-x86_64
          if-no-files-found: error

  static-windows:
    name: Static Windows
    runs-on: windows-latest
    needs: test-linux

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-flex
            mingw-w64-ucrt-x86_64-bison

      - name: Configure static build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Prepare artifact
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p dist
          cp build/platlang.exe dist/platlang-windows-x86_64.exe

      - name: Upload Windows artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: platlang-windows-x86_64
          path: dist/platlang-windows-x86_64.exe
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - static-linux
      - static-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/platlang-linux-x86_64/platlang-linux-x86_64 \
            dist/platlang-windows-x86_64/platlang-windows-x86_64.exe \
            --title "plat-lang ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"
