name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  pull_request:

permissions:
  contents: read

jobs:
  test-linux:
    name: Test Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build libsdl2-dev

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DPLATLANG_ENABLE_SDL_CANVAS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          SDL_VIDEODRIVER: dummy
        run: ctest --test-dir build --output-on-failure

  package-linux:
    name: Package Linux
    runs-on: ubuntu-latest
    needs: test-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ flex bison ninja-build libsdl2-dev patchelf

      - name: Configure release build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DPLATLANG_ENABLE_SDL_CANVAS=ON
          -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          SDL_VIDEODRIVER: dummy
        run: ctest --test-dir build --output-on-failure

      - name: Prepare package
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        run: |
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            package_name="platlang-develop-linux-x86_64"
          else
            package_name="platlang-linux-x86_64"
          fi

          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}/bin" "${package_dir}/lib"
          cp build/platlang "${package_dir}/bin/platlang"
          cp build/libplatlang_core.so "${package_dir}/lib/"
          cp build/platlang_keywords.json "${package_dir}/platlang_keywords.json"
          cp -R build/capabilities "${package_dir}/capabilities"

          canvas_module="${package_dir}/capabilities/canvas/libplatlang_canvas_sdl.so"
          sdl_lib="$(LD_LIBRARY_PATH="${package_dir}/lib" ldd "${canvas_module}" | awk '/libSDL2-2.0.so/ { print $3; exit }')"
          if [ -z "${sdl_lib}" ] || [ ! -f "${sdl_lib}" ]; then
            echo "could not find linked SDL2 runtime with ldd" >&2
            LD_LIBRARY_PATH="${package_dir}/lib" ldd "${canvas_module}" >&2
            exit 1
          fi
          cp "${sdl_lib}" "${package_dir}/capabilities/canvas/"

          patchelf --set-rpath '$ORIGIN/../lib' "${package_dir}/bin/platlang"
          patchelf --set-rpath '$ORIGIN:$ORIGIN/../../lib' "${canvas_module}"
          strip "${package_dir}/bin/platlang" "${package_dir}/lib/"*.so* "${package_dir}/capabilities/canvas/"*.so*
          chmod +x "${package_dir}/bin/platlang"

          LD_LIBRARY_PATH="${package_dir}/lib" ldd "${package_dir}/bin/platlang" | tee "${package_dir}/ldd.txt"
          if grep -q "not found" "${package_dir}/ldd.txt"; then
            echo "package has missing shared library dependencies" >&2
            exit 1
          fi

          while IFS= read -r library; do
            LD_LIBRARY_PATH="${package_dir}/lib" ldd "${library}" | tee -a "${package_dir}/ldd.txt"
          done < <(find "${package_dir}/lib" "${package_dir}/capabilities" -type f -name '*.so*')

          if grep -q "not found" "${package_dir}/ldd.txt"; then
            echo "bundled shared library has missing dependencies" >&2
            exit 1
          fi

          rm "${package_dir}/ldd.txt"
          mkdir -p dist/artifacts
          tar -czf "dist/artifacts/${package_name}.tar.gz" -C dist "${package_name}"

      - name: Upload Linux artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: platlang-linux-x86_64
          path: dist/artifacts/*
          if-no-files-found: error

  package-windows:
    name: Package Windows
    runs-on: windows-latest
    needs: test-linux

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            flex
            bison
            diffutils

      - name: Configure release build
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DPLATLANG_ENABLE_SDL_CANVAS=ON
          -DCMAKE_EXE_LINKER_FLAGS="-static -static-libgcc -static-libstdc++"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        env:
          SDL_VIDEODRIVER: dummy
        run: ctest --test-dir build --output-on-failure

      - name: Prepare package
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        run: |
          if [ "${GITHUB_REF_NAME}" = "develop" ]; then
            package_name="platlang-develop-windows-x86_64"
          else
            package_name="platlang-windows-x86_64"
          fi

          package_dir="dist/${package_name}"
          mkdir -p "${package_dir}"
          cp build/platlang.exe "${package_dir}/platlang.exe"
          cp build/platlang_core.dll "${package_dir}/platlang_core.dll"
          cp build/platlang_keywords.json "${package_dir}/platlang_keywords.json"
          cp -R build/capabilities "${package_dir}/capabilities"

          package_path="${package_dir}:${package_dir}/capabilities/canvas:${PATH}"
          PATH="${package_path}" ldd "${package_dir}/platlang.exe" | tee "${package_dir}/ldd.txt"
          if grep "not found" "${package_dir}/ldd.txt" | grep -v 'api-ms-win-crt-'; then
            echo "package has missing shared library dependencies" >&2
            exit 1
          fi

          PATH="${package_path}" ldd "${package_dir}/platlang.exe" \
            | awk '/\/ucrt64\// { print $3 }' \
            | sort -u \
            | while IFS= read -r dependency; do
                cp "${dependency}" "${package_dir}/"
              done

          canvas_module="${package_dir}/capabilities/canvas/platlang_canvas_sdl.dll"
          PATH="${package_path}" ldd "${canvas_module}" | tee -a "${package_dir}/ldd.txt"
          if grep "not found" "${package_dir}/ldd.txt" | grep -v 'api-ms-win-crt-'; then
            echo "canvas capability has missing shared library dependencies" >&2
            exit 1
          fi

          PATH="${package_path}" ldd "${canvas_module}" \
            | awk '/\/ucrt64\/.*SDL2.*\.dll/ { print $3 }' \
            | sort -u \
            | while IFS= read -r dependency; do
                cp "${dependency}" "${package_dir}/capabilities/canvas/"
              done

          strip "${package_dir}/platlang.exe" || true
          rm "${package_dir}/ldd.txt"
          mkdir -p dist/artifacts
          (
            cd dist
            cmake -E tar cf "artifacts/${package_name}.zip" --format=zip "${package_name}"
          )

      - name: Upload Windows artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/develop'
        uses: actions/upload-artifact@v4
        with:
          name: platlang-windows-x86_64
          path: dist/artifacts/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-windows
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/platlang-linux-x86_64/platlang-linux-x86_64.tar.gz \
            dist/platlang-windows-x86_64/platlang-windows-x86_64.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "plat-lang ${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"

  develop-release:
    name: Develop Release
    runs-on: ubuntu-latest
    needs:
      - package-linux
      - package-windows
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: write
    concurrency:
      group: develop-release
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Move develop release tag
        run: |
          git tag -f develop-latest "${GITHUB_SHA}"
          git push --force origin refs/tags/develop-latest

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Update GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Continuously updated development build from the develop branch.

          Commit: ${GITHUB_SHA}

          This is an unstable build for testing the latest changes. Use tagged releases for stable versions."

          if gh release view develop-latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit develop-latest \
              --repo "${GITHUB_REPOSITORY}" \
              --title "plat-lang develop" \
              --notes "${notes}" \
              --prerelease
          else
            gh release create develop-latest \
              --repo "${GITHUB_REPOSITORY}" \
              --title "plat-lang develop" \
              --notes "${notes}" \
              --prerelease \
              --target "${GITHUB_SHA}"
          fi

          gh release upload develop-latest \
            dist/platlang-linux-x86_64/platlang-develop-linux-x86_64.tar.gz \
            dist/platlang-windows-x86_64/platlang-develop-windows-x86_64.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
